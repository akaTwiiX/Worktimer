<div class="replacement-dialog">
    <p>Es gibt noch Termine mit der Farbe <b [style.color]="data.originalColor.value">{{ data.originalColor.label }}</b>. Bitte wähle eine Ersatzfarbe aus:</p>
    <div class="replacement-grid">
        @for (color of data.colors; track color.id) {
        <div class="color-option" [class.selected]="newColorId() === color.id" (click)="onSelect(color.id)">
            <div class="color-preview" [style.background-color]="color.value"></div>
            <span>{{ color.label }}</span>
        </div>
        }
    </div>
    <div class="dialog-actions">
        <p-button label="Abbrechen" severity="secondary" [outlined]="true" (onClick)="onCancel()" />
        @if (newColorId() !== null) {
        <p-button label="Speichern" severity="primary" (onClick)="onSave()" />
        }
    </div>
</div>
